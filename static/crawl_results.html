<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>采集结果 · 小红书助手</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f7;color:#1d1d1f;padding:32px 20px;min-height:100vh}
    .container{max-width:960px;margin:0 auto}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
    .topbar h1{font-size:22px;font-weight:600;color:#ff2442}
    .topbar .back{font-size:13px;color:#86868b;text-decoration:none}
    .topbar .back:hover{color:#ff2442}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s;text-decoration:none;display:inline-block;text-align:center}
    .btn:hover{opacity:.85}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .btn-primary{background:#ff2442;color:#fff}
    .btn-outline{background:#fff;color:#1d1d1f;border:1.5px solid #e0e0e5}
    .btn-green{background:#34c759;color:#fff}
    .stat{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:16px;font-size:14px;color:#86868b;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .stat strong{color:#1d1d1f;font-size:16px}
    .table-wrap{overflow-x:auto;border-radius:14px;border:1.5px solid #e0e0e5;background:#fff}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{background:#f5f5f7;padding:10px 12px;text-align:left;font-weight:600;white-space:nowrap;border-bottom:1.5px solid #e0e0e5}
    td{padding:10px 12px;border-bottom:1px solid #f0f0f0;vertical-align:top;max-width:220px;word-break:break-all}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fafafa}
    .tag{display:inline-block;background:#fff0f3;color:#ff2442;border-radius:6px;padding:1px 6px;font-size:11px;margin:1px}
    a{color:#ff2442;text-decoration:none}
    a:hover{text-decoration:underline}
    .num{text-align:right;font-variant-numeric:tabular-nums}
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;display:none;z-index:999}
  </style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <h1>📊 采集结果</h1>
    <a class="back" href="/static/crawl.html">← 返回采集页</a>
  </div>

  <div class="stat" id="statBar">加载中…</div>

  <div class="actions">
    <button class="btn btn-green" id="feishuBtn">📤 导入飞书</button>
    <button class="btn btn-primary" id="generateBtn">✨ 生成新笔记 →</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>标题</th><th>作者</th>
          <th>评论</th><th>点赞</th><th>收藏</th>
          <th>发布时间</th><th>标签</th><th>关键词</th><th>链接</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div id="toast"></div>

<script>
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function toast(msg,ms=2500){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',ms)}

  const raw = localStorage.getItem('xhs_crawl_result');
  if (!raw) { document.getElementById('statBar').textContent = '未找到采集数据，请先返回采集页运行采集。'; }

  const data = raw ? JSON.parse(raw) : null;

  if (data) {
    document.getElementById('statBar').innerHTML =
      `共采集 <strong>${data.count}</strong> 条笔记（目标 ${data.target_count} 条）`;

    document.getElementById('tbody').innerHTML = (data.items || []).map((item, i) => `
      <tr>
        <td>${i+1}</td>
        <td>${esc(item.title)}</td>
        <td>${esc(item.author||'-')}</td>
        <td class="num">${item.comments??0}</td>
        <td class="num">${item.likes??0}</td>
        <td class="num">${item.favorites??0}</td>
        <td>${esc(item.publish_time||'-')}</td>
        <td>${(item.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</td>
        <td>${esc(item.keyword_used||'-')}</td>
        <td>${item.url?`<a href="${esc(item.url)}" target="_blank">查看</a>`:'-'}</td>
      </tr>`).join('');
  }

  document.getElementById('feishuBtn').addEventListener('click', async function() {
    if (!data?.items?.length) { toast('没有数据可导入'); return; }
    this.disabled = true;
    this.textContent = '⏳ 同步中…';
    try {
      const resp = await fetch('/feishu/sync-crawled', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ items: data.items }),
      });
      const result = await resp.json();
      toast(result.success ? `✅ ${result.message}` : `❌ ${result.message}`, 3500);
    } catch(e) {
      toast('❌ 请求失败：' + e.message, 3500);
    } finally {
      this.disabled = false;
      this.textContent = '📤 导入飞书';
    }
  });

  document.getElementById('generateBtn').addEventListener('click', () => {
    window.location.href = '/static/generate.html';
  });
</script>
</body>
</html>
