<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生成笔记 · 小红书助手</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f7;color:#1d1d1f;padding:40px 20px;min-height:100vh}
    .container{max-width:600px;margin:0 auto}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
    h1{font-size:24px;font-weight:600;color:#ff2442}
    .back{font-size:13px;color:#86868b;text-decoration:none}
    .back:hover{color:#ff2442}
    .card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .card h2{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:6px}
    .card h2 span{font-size:17px}
    label{display:block;font-size:13px;color:#86868b;margin-bottom:5px}
    input,select{width:100%;border:1.5px solid #e0e0e5;border-radius:10px;padding:10px 12px;font-size:14px;color:#1d1d1f;outline:none;background:#fafafa;transition:border-color .2s}
    input:focus,select:focus{border-color:#ff2442;background:#fff}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    .hint{font-size:12px;color:#aeaeb2;margin-top:4px}
    .btn{display:block;width:100%;padding:14px;background:#ff2442;color:#fff;font-size:16px;font-weight:600;border:none;border-radius:12px;cursor:pointer;transition:opacity .2s;margin-top:4px}
    .btn:hover{opacity:.88}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    #status{display:none;margin-top:16px;padding:14px 18px;border-radius:12px;font-size:14px;line-height:1.7}
    #status.running{background:#fff8e1;color:#b36a00;display:block}
    #status.error{background:#fdecea;color:#c62828;display:block}
    .info-box{background:#f0f7ff;border-radius:10px;padding:12px 14px;font-size:13px;color:#1a6fb5;margin-bottom:16px}
  </style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <h1>✨ 生成新笔记</h1>
    <a class="back" href="/static/crawl_results.html">← 返回采集结果</a>
  </div>

  <div class="info-box" id="dataHint"></div>

  <form id="genForm">
    <div class="card">
      <h2><span>👤</span> 受众与风格</h2>
      <div class="row2">
        <div>
          <label>目标受众</label>
          <input id="audience" value="大学生女性" placeholder="大学生女性" />
        </div>
        <div>
          <label>内容风格</label>
          <select id="tone">
            <option value="真实分享">真实分享</option>
            <option value="种草推荐">种草推荐</option>
            <option value="教程攻略">教程攻略</option>
            <option value="测评对比">测评对比</option>
            <option value="避雷提醒">避雷提醒</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <h2><span>📋</span> 生成数量</h2>
      <div class="row2">
        <div>
          <label>生成话题数</label>
          <input type="number" id="topicCount" value="1" min="1" max="5" />
          <p class="hint">建议 1~3 个</p>
        </div>
        <div>
          <label>每话题内容条数</label>
          <input type="number" id="contentCount" value="1" min="1" max="3" />
        </div>
      </div>
    </div>

    <div class="card">
      <h2><span>🖼️</span> 图片生成</h2>
      <div class="row3">
        <div>
          <label>图片张数</label>
          <input type="number" id="imageCount" value="1" min="1" max="4" />
        </div>
        <div>
          <label>是否原创</label>
          <select id="isOriginal">
            <option value="true">是</option>
            <option value="false">否</option>
          </select>
        </div>
        <div>
          <label>可见性</label>
          <select id="visibility">
            <option value="公开可见">公开可见</option>
            <option value="仅自己可见">仅自己可见</option>
            <option value="仅互关好友可见">仅互关好友可见</option>
          </select>
        </div>
      </div>
    </div>

    <button type="submit" class="btn" id="submitBtn">🚀 一键生成（话题 + 文案 + 图片）</button>
  </form>

  <div id="status"></div>
</div>

<script>
  const crawlRaw = localStorage.getItem('xhs_crawl_result');
  const hint = document.getElementById('dataHint');
  if (crawlRaw) {
    const count = JSON.parse(crawlRaw).count || 0;
    hint.textContent = `✅ 将基于本次采集的 ${count} 条笔记数据进行分析生成`;
  } else {
    hint.textContent = '💡 未检测到采集数据，将使用内置样本数据生成';
  }

  const statusEl = document.getElementById('status');
  function setStatus(type, msg) {
    statusEl.className = type;
    statusEl.innerHTML = msg;
    statusEl.style.display = 'block';
  }

  document.getElementById('genForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;

    const audience     = document.getElementById('audience').value.trim() || '大学生女性';
    const tone         = document.getElementById('tone').value;
    const topicCount   = parseInt(document.getElementById('topicCount').value)   || 1;
    const contentCount = parseInt(document.getElementById('contentCount').value) || 1;
    const imageCount   = parseInt(document.getElementById('imageCount').value)   || 1;
    const isOriginal   = document.getElementById('isOriginal').value === 'true';
    const visibility   = document.getElementById('visibility').value;

    // 如有爬取数据则注入
    let items = undefined;
    if (crawlRaw) {
      try { items = JSON.parse(crawlRaw).items; } catch(_) {}
    }

    setStatus('running', '⏳ 第 1/3 步：分析数据，生成话题与文案…');

    try {
      // Step 1: agent/run
      const agentResp = await fetch('/agent/run', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ audience, tone,
          topic_count: topicCount,
          content_count_per_topic: contentCount,
          items }),
      });
      if (!agentResp.ok) throw new Error((await agentResp.json()).detail || `HTTP ${agentResp.status}`);
      const agentResult = await agentResp.json();

      // Step 2: 对每个话题下的每条内容都生成图片
      const total = agentResult.results.reduce((s, r) => s + r.contents.length, 0);
      let done = 0;
      const preparedResults = [];

      for (const item of agentResult.results) {
        for (const content of item.contents) {
          done++;
          setStatus('running', `⏳ 第 2/3 步：生成配图 ${done} / ${total}，请稍候…`);
          const prepResp = await fetch('/publish/prepare', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
              topic: item.topic,
              content,
              image_count: imageCount,
              is_original: isOriginal,
              visibility,
              mode: 'mcp',
            }),
          });
          if (!prepResp.ok) throw new Error((await prepResp.json()).detail || `HTTP ${prepResp.status}`);
          preparedResults.push({
            topic: item.topic,
            content,
            prepare_result: await prepResp.json(),
          });
        }
      }

      setStatus('running', '⏳ 第 3/3 步：整理数据，即将跳转…');

      localStorage.setItem('xhs_generate_result', JSON.stringify({
        agent_result: agentResult,
        prepared_results: preparedResults,
        image_count: imageCount,
        is_original: isOriginal,
        visibility,
      }));

      setTimeout(() => { window.location.href = '/static/generate_results.html'; }, 600);

    } catch(err) {
      setStatus('error', `❌ 生成失败：${err.message}`);
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
